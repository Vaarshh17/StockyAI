name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pylint
      - run: pylint agent bot db scheduler services tests
    continue-on-error: true 

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest

  deploy:
    runs-on: ubuntu-latest
    needs: test

  
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - run: echo "deploying services..." # deploys code non-simulation environment